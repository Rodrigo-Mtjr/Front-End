<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">

  <title>Aula 05 - TABELAS</title>
</head>

<body>
  <!--CRIANDO UMA TABELA NO CENTRO DA TELA, COM UMA BORDA DE 2 E ALINHADO AO CENTRO-->
  <h1 align="center"> CRIANDO UMA TABELA </h1>
  <table border="2" align="center">

    <!--A TABELA É PREENCHIDA EM SEQUENCIA NA MESMA LINHA, NAO TEM QUEBRA DE LINHA-->
    <tr> <!--PARA ACRESCENTEAR INFO DENTRO DA TABELA TEM QUE ABRIR UM TR-->
      <td>CÓDIGO</td>
      <td>PRODUTO</td>
      <td>PREÇOS</td>
    </tr>

    <tr>
      <td>01</td>
      <td>NOTEBOOK</td>
      <td>R$ 4.500,00</td>
    </tr>
  </table>
</body>

</html>
