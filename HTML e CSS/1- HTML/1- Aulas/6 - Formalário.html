<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Aula 07 - Formulários</title>
</head>

<body>
  <h1 align="center"> Criando Formulários</h1>
  <form align="center">

    <fieldset> <!--CRIA UM QUADRADO PARA ARMAZENAR AS COISAS DENTRO-->
      <br>
      Login: <input type="text" name="nome"><br> <!--LOCAL PARA O USUARIO ESCREVER, QUE VAI RECEBER ALGUM TIPO DE CARACTERE OU NUMERO. ENTAO TEM QUE DECALRAR COM A FUNÇÃO INPUT TYPE O TIPO QUE VAI SER INSERIDO DENTRO DO ESPAÇO DETERMINADO E DEPOIS DECLARAR O NOME DESSA TAG-->
      <br> <!--PULANDO LINHA-->
      Senha: <input type="password" name="endereço"><br>
      <br>
      <input type="submit" name="" value="Entrar"> <!--CRIANDO UM BOTAO CHAMADO LOGIN, DO TIPO QUE VAI ENVIAR ALGO COISA QUANDO FOR CLICADO-->
      <input type="submit" name="" value="Esqueceu a senha?">
      <br>
      <br>
      <a href="/link">Não tem conta? Cadastre-se</a>
    </fieldset>
    <br>

<!--CRIANDO UM ESPAÇO PARA CADASTRAR AS INFORMAÇÕES DO USUARIO SEM CADASTRO NO SITE-->

    <fieldset>
      <br>
      Nome: <input type="text" name="nome"><br>
      <br>
      Cidade: <input type="text" name="cidade"><br>
      <br>
      Estado:
      <select> <!--CRIA UMA OPÇÃO PARA O USUARIO ESCOLHER REPOSTAS JA PRE DETERMINADAS, ENTAO EM SEGUIDA TEMOS QUE CRIAR AS OPÇÕES PARA ELE ESCOLHER.
      COM ESSA FUNÇÃO, ELE PODE MARCAR E DESMARCAR MAIS DE UMA RESPOSTAS-->
        <option>--</option> <!--VAI SALVAR DENTRO DA TAG SELECT, AS OPÇÃO ESCRITA ENTRE A OPTION-->
        <option>RJ</option>
        <option>SP
      </select>
      <br>
      <br>
      Habilidades:
      Matemática: <input type="checkbox" name="" value="Matematica"> <!--CRIA UM CHECKBOX PARA SER ASSINALADO CONFORME O USUARIO SE IDENTIFICAR COM AS INFORMAÇÃOS JA PREENCHIDAS. COM ESSA FUNÇÃO, ELE APENAS PODE ESCOLHER UMA RESPOSTA DETERMINADA.-->
      Português: <input type="checkbox" name="" value="Português">
      Outras: <input type="text" name="habilidade">
      <br>
      <br>
      Sexo:
      <input type="radio" name="sexo" value="Masculino"> Masculino
      <input type="radio" name="sexo" value="Feminino"> Feminino
      <br>
      <br>
      <input type="submit" name="" value="Cadastrar">
    </fieldset>
  </form>

</body>

</html>
