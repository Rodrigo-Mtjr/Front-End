<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">

  <title>Cadastro de Usuario</title>
</head>

<body>

  <h1 align="center">Cadastro de Usuário 1.1</h1>
  
    <fieldset>
      <br>
      Nome: <input type="text" name="nome"><br>
      <br>
      Cidade: <input type="text" name="cidade"><br>
      <br>
      Estado:
      <select>
        <option>--</option>
        <option>RJ</option>
        <option>SP
      </select>
      <br>
      <br>
      Habilidades:

      <br>
      <br>
      Sexo:
      <input type="radio" name="sexo" value="Masculino"> Masculino
      <input type="radio" name="sexo" value="Feminino"> Feminino
      <br>
      <br>
      <input align="center" type="submit" name="" value="Cadastrar">
      <a href="Formulário2.html"><input type="submit" name="" value="Cancelar"></a>
    </fieldset>

</html>
