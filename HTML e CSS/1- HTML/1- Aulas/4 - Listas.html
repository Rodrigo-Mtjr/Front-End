<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <title>Document</title>
</head>

<body>
  <h1>Criando Listas</h1>
<fieldset> <!--CRIA UM QUADRO PARA GUARDAR AS INFORMAÇÕES-->
  <h2>Lista ordenada</h2>
  <ol>
    <!--CRIA UMA LISTA EM ORDEM NUMERICA-->
    <li>Lista ordenada 01</li> 
    <li>Lista ordenada 02</li>
    <li>Lista ordenada 03</li>
  </ol>
</fieldset>

<fieldset>
  <h2>Lista não ordenada</h2>

  <ul>
    <!--CRIA UMA LISTA APENAS COM PONTOS-->
    <li>Lista não ordenada 01</li>
    <li>Lista não ordenada 02</li>
    <li>Lista não ordenada 03</li>
  </ul>
</fieldset>

</body>
</html>
